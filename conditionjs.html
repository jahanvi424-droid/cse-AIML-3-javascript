<!DOCTYPE html>
<html lang="en">

<body>
    <script>
        // conditional statement :

        //if...
        
        // if ........ else
        let myAge=23;
        if(myAge>=18){
            console.log(" VALID FOR CASTING");

        }
        else{
            console.log( " not valid age");
        }
        //switch case
        let grade='A';
        switch(grade){
            case'A': result= " first division";
            break;
            case'B': result= " second division";
            break;
            case'c': result= " third division";
            break;
            default:result="fail";

        }
        console.log(result);
        //if ....elseif.....else....
        let marks=12;
        if(marks>=60){
            console.log(" first division");
        }
        else if (marks<59 && marks>40){
            console.log(" second division");
        }
        else if (marks<40 && marks>30){
            console.log(" third division");
        }
        else{
            console.log(" fail");
        }
        
    </script>
</body>
